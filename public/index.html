<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WaterTrack">
<meta name="theme-color" content="#07111e">
<title>WaterTrack Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Karla:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#07111e;overflow-x:hidden;height:100%}
body{
  font-family:'Karla',sans-serif;font-size:14px;line-height:1.5;
  background:#07111e;color:#e0eaf4;
  overflow-x:hidden;min-height:100%;
  -webkit-text-size-adjust:100%;
}
:root{
  --ink:#07111e;--deep:#0b1a2d;--panel:#0f2239;--raised:#162c44;
  --line:#1e3a58;--wave:#0284c7;--foam:#38bdf8;--mint:#10b981;
  --gold:#f59e0b;--rose:#f43f5e;--txt:#e0eaf4;--sub:#7ca0be;
}
input,select,button{font-family:'Karla',sans-serif;-webkit-appearance:none}
button{cursor:pointer;border:none}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;min-height:100vh;width:100%;overflow:hidden}

/* ── TOPBAR ── */
#topbar{
  background:linear-gradient(90deg,var(--deep),#0a1f35);
  border-bottom:2px solid var(--wave);
  padding:12px 14px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
  width:100%;
}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:2px;color:var(--foam);text-transform:uppercase;white-space:nowrap}
.logo b{color:var(--mint)}
.nav{display:flex;gap:4px;margin-left:auto}
.nav-btn{
  padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.6px;
  color:var(--sub);background:transparent;transition:all .15s;
  border:none;cursor:pointer;white-space:nowrap;
}
.nav-btn.on{background:var(--wave);color:#fff}

/* ── MAIN ── */
#main{flex:1;padding:14px;width:100%;overflow-x:hidden}

/* ── PANELS ── */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;width:100%}
.panel-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--foam);text-transform:uppercase;margin-bottom:12px}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%}
@media(min-width:400px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:600px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:12px 8px;text-align:center;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kpi-color,var(--wave))}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;line-height:1;color:var(--kpi-color,var(--foam))}
.kpi-label{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-top:3px}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;width:100%}
@media(min-width:400px){.stat-grid{grid-template-columns:repeat(3,1fr)}}
.stat{background:var(--raised);border:1px solid var(--line);border-radius:8px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center;min-width:0}
.stat-label{font-size:10px;color:var(--sub);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:4px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--txt);flex-shrink:0}

/* ── PLAYER ROW ── */
.p-list{display:flex;flex-direction:column;gap:6px;width:100%}
.p-row{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;width:100%;cursor:pointer;-webkit-tap-highlight-color:transparent}
.p-row.sel{border-color:var(--wave);background:#0e2540}
.p-num{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--wave);width:30px;text-align:center;line-height:1;flex-shrink:0}
.p-info{flex:1;min-width:0}
.p-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-pos{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.8px}
.p-chips{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.p-actions{display:flex;gap:4px;flex-shrink:0}

/* ── CHIPS ── */
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;border:1px solid transparent}
.chip-blue{background:rgba(2,132,199,.15);color:var(--foam);border-color:rgba(2,132,199,.3)}
.chip-green{background:rgba(16,185,129,.15);color:var(--mint);border-color:rgba(16,185,129,.3)}
.chip-gold{background:rgba(245,158,11,.15);color:var(--gold);border-color:rgba(245,158,11,.3)}
.chip-gray{background:rgba(124,160,190,.1);color:var(--sub);border-color:rgba(124,160,190,.2)}
.chip-red{background:rgba(244,63,94,.15);color:var(--rose);border-color:rgba(244,63,94,.3)}

/* ── TYPE DOT ── */
.tdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.tdot.junior{background:var(--sub)}
.tdot.senior{background:var(--mint)}
.tdot.professional{background:var(--gold)}
.tdot.standard{background:var(--foam)}

/* ── SEASON PILLS ── */
.s-pills{display:flex;flex-wrap:wrap;gap:6px}
.s-pill{padding:5px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;border:1px solid var(--line);background:var(--raised);color:var(--sub);white-space:nowrap;-webkit-tap-highlight-color:transparent}
.s-pill.on{background:var(--wave);border-color:var(--wave);color:#fff}

/* ── TABS ── */
.tab-bar{display:flex;gap:3px;background:var(--raised);padding:4px;border-radius:9px;width:100%;margin-bottom:14px}
.tab-btn{flex:1;padding:8px 4px;border-radius:6px;border:none;font-family:'Karla',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);background:transparent;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.tab-btn.on{background:var(--wave);color:#fff}

/* ── BUTTONS ── */
.btn{padding:8px 14px;border-radius:7px;border:none;font-family:'Karla',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn-blue{background:var(--wave);color:#fff}
.btn-green{background:var(--mint);color:#07111e}
.btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--line)}
.btn-red{background:transparent;color:var(--rose);border:1px solid var(--rose)}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}

/* ── FORMS ── */
.f-group{display:flex;flex-direction:column;gap:5px;width:100%}
.f-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px}
.f-input{background:var(--raised);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:10px 12px;font-family:'Karla',sans-serif;font-size:16px;width:100%;-webkit-appearance:none}
.f-input:focus{outline:none;border-color:var(--wave)}
.f-grid{display:grid;grid-template-columns:1fr;gap:10px;width:100%}
@media(min-width:400px){.f-grid{grid-template-columns:repeat(2,1fr)}}
.f-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--deep);border:1px solid var(--line);border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideUp .22s ease}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:2px;color:var(--foam);text-transform:uppercase;margin-bottom:16px}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── CAREER BANNER ── */
.career-banner{background:linear-gradient(135deg,#0a1e33,#071629,#0b2240);border:1px solid var(--wave);border-radius:14px;padding:14px;margin-bottom:14px;width:100%}

/* ── GAME ENTRY ── */
.g-entry{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px;width:100%}
.g-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}

/* ── SEASON HEADER ── */
.s-header{background:linear-gradient(135deg,var(--raised),#102237);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px;width:100%}
.s-header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.s-actions{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
table{border-collapse:collapse;min-width:100%}
th{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;padding:7px 8px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:8px 8px;font-size:13px;border-bottom:1px solid rgba(30,58,88,.4)}
tr:last-child td{border-bottom:none}
.hi{color:var(--mint);font-weight:700}
.gold{color:var(--gold);font-weight:700}

/* ── MISC ── */
.div{height:1px;background:var(--line);margin:14px 0}
.empty{text-align:center;padding:32px 16px;color:var(--sub)}
.empty-icon{font-size:40px;margin-bottom:10px}
.swim-best{color:var(--mint);font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:18px}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.cat-offense{background:rgba(2,132,199,.15);color:var(--foam)}
.cat-defense{background:rgba(16,185,129,.15);color:var(--mint)}
.cat-general{background:rgba(245,158,11,.15);color:var(--gold)}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:6px}
.mb2{margin-bottom:8px}
.mb3{margin-bottom:12px}
.mb4{margin-bottom:16px}
.text-xs{font-size:11px}
.text-sub{color:var(--sub)}
.text-bold{font-weight:700}
.text-foam{color:var(--foam)}
.bc-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:2px;color:var(--foam)}
.hidden{display:none}
</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <div class="logo">Water<b>Track</b></div>
    <nav class="nav" id="main-nav">
      <button class="nav-btn" id="nav-dashboard" onclick="showPage('dashboard')">Dashboard</button>
      <button class="nav-btn on" id="nav-roster" onclick="showPage('roster')">Roster</button>
    </nav>
  </header>
  <main id="main"></main>
</div>

<!-- MODALS -->
<div class="overlay hidden" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content" onclick="event.stopPropagation()"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const STORE_KEY = 'wpt_v5';
const POSITIONS = ['Goalkeeper','Center','Driver','Wing','Utility','Point'];
const SWIM_EVENTS = ['50 Free','100 Free','50 Breast','50 Back'];
const STAT_FIELDS = [
  {key:'goals',label:'Goals',cat:'offense'},
  {key:'attempts',label:'Attempts',cat:'offense'},
  {key:'missedShots',label:'Missed Shots',cat:'offense'},
  {key:'penaltyGoals',label:'Penalty Goals',cat:'offense'},
  {key:'powerPlayGoals',label:'Power Play Goals',cat:'offense'},
  {key:'counterAttackGoals',label:'Counter-Attack G',cat:'offense'},
  {key:'assists',label:'Assists',cat:'offense'},
  {key:'blocks',label:'Blocks',cat:'defense'},
  {key:'steals',label:'Steals',cat:'defense'},
  {key:'goalsAllowed',label:'Goals Allowed',cat:'defense'},
  {key:'earnedExclusions',label:'Earned Exclusions',cat:'defense'},
  {key:'exclusionsForced',label:'Exclusions Forced',cat:'defense'},
  {key:'sprints',label:'Sprints Won',cat:'general'},
  {key:'personalFouls',label:'Personal Fouls',cat:'general'},
  {key:'turnovers',label:'Turnovers',cat:'general'},
];

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const emptyStats = () => Object.fromEntries(STAT_FIELDS.map(f=>[f.key,0]));

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  players: [],
  page: 'roster',          // 'roster' | 'dashboard' | 'player'
  selectedPlayerId: null,
  selectedSeasonId: null,  // null = career view
  careerSelected: new Set(),
};

// ── STORAGE ───────────────────────────────────────────────────────────────────
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify({players: state.players})); } catch(e){}
}
function load() {
  try {
    const d = localStorage.getItem(STORE_KEY);
    if (d) { const p = JSON.parse(d); state.players = p.players || []; }
  } catch(e){}
}

// ── KPI ───────────────────────────────────────────────────────────────────────
function aggregate(games) {
  const t = emptyStats();
  games.forEach(g => STAT_FIELDS.forEach(({key}) => { t[key] += (g.stats[key]||0); }));
  return t;
}
function calcKPIs(games) {
  const t = aggregate(games);
  const gp = games.length;
  const shootPct = t.attempts > 0 ? ((t.goals/t.attempts)*100).toFixed(1) : '—';
  const savePct  = (t.blocks+t.goalsAllowed) > 0 ? ((t.blocks/(t.blocks+t.goalsAllowed))*100).toFixed(1) : '—';
  const api = gp > 0 ? ((t.goals*3+t.assists*2+t.steals*2+t.blocks*2+t.earnedExclusions-t.turnovers-t.personalFouls)/gp).toFixed(2) : '—';
  const opi = gp > 0 ? ((t.goals*4+t.assists*2+t.powerPlayGoals*1.5+t.counterAttackGoals*1.5-t.missedShots*0.5-t.turnovers)/gp).toFixed(2) : '—';
  const dpi = gp > 0 ? ((t.blocks*3+t.steals*2+t.earnedExclusions*1.5+t.exclusionsForced-t.goalsAllowed*0.5-t.personalFouls)/gp).toFixed(2) : '—';
  return {t, gp, shootPct, savePct, api, opi, dpi};
}
function bestTime(entries) {
  if (!entries||!entries.length) return null;
  return Math.min(...entries.map(e=>e.time));
}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function kpiCard(label, val, color='var(--foam)') {
  return `<div class="kpi" style="--kpi-color:${color}"><div class="kpi-val">${val}</div><div class="kpi-label">${label}</div></div>`;
}
function statCard(label, val) {
  return `<div class="stat"><span class="stat-label">${label}</span><span class="stat-val">${val}</span></div>`;
}
function typeBadge(type) {
  const map = {junior:['chip-gray','JR'],senior:['chip-green','SR'],professional:['chip-gold','PRO'],standard:['chip-blue','STD']};
  const [cls,lbl] = map[type]||map.standard;
  return `<span class="chip ${cls}">${lbl}</span>`;
}
function typeDot(type) {
  return `<span class="tdot ${type}"></span>`;
}

// ── PAGES ─────────────────────────────────────────────────────────────────────
function showPage(page) {
  state.page = page;
  state.selectedPlayerId = null;
  document.getElementById('main-nav').classList.remove('hidden');
  ['dashboard','roster'].forEach(p => {
    document.getElementById('nav-'+p).classList.toggle('on', p===page);
  });
  render();
}

function render() {
  const main = document.getElementById('main');
  if (state.page === 'roster') main.innerHTML = renderRoster();
  else if (state.page === 'dashboard') main.innerHTML = renderDashboard();
  else if (state.page === 'player') {
    document.getElementById('main-nav').classList.add('hidden');
    main.innerHTML = renderPlayerDetail();
  }
}

// ── ROSTER PAGE ───────────────────────────────────────────────────────────────
function renderRoster() {
  const sorted = [...state.players].sort((a,b)=>(parseInt(a.number)||99)-(parseInt(b.number)||99));
  let rows = sorted.length === 0
    ? `<div class="panel"><div class="empty"><div class="empty-icon">👤</div><p>No players yet.<br>Add your first player.</p></div></div>`
    : sorted.map(p => {
        const games = p.seasons.flatMap(s=>s.games);
        const {gp} = calcKPIs(games);
        return `
        <div class="p-row" onclick="openPlayer('${p.id}')">
          <div class="p-num">#${p.number||'?'}</div>
          <div class="p-info">
            <div class="p-name">${p.name}</div>
            <div class="p-pos">${p.position}</div>
          </div>
          <div class="p-chips">
            <span class="chip chip-blue">${p.seasons.length}S</span>
            <span class="chip chip-gray">${gp}G</span>
          </div>
          <div class="p-actions" onclick="event.stopPropagation()">
            <button class="btn btn-ghost btn-xs" onclick="modalEditPlayer('${p.id}')">✏️</button>
            <button class="btn btn-red btn-xs" onclick="deletePlayer('${p.id}')">✕</button>
          </div>
        </div>`;
      }).join('');

  return `
    <div class="row-between mb3">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;color:var(--foam);text-transform:uppercase">Roster (${state.players.length})</span>
      <button class="btn btn-blue btn-sm" onclick="modalAddPlayer()">+ Player</button>
    </div>
    <div class="p-list">${rows}</div>`;
}

// ── DASHBOARD PAGE ────────────────────────────────────────────────────────────
function renderDashboard() {
  const allGames = state.players.flatMap(p=>p.seasons.flatMap(s=>s.games));
  const {t,gp,shootPct,api} = calcKPIs(allGames);

  const topScorers = [...state.players]
    .map(p=>({p, k:calcKPIs(p.seasons.flatMap(s=>s.games))}))
    .sort((a,b)=>b.k.t.goals-a.k.t.goals).slice(0,5);

  const topAPI = [...state.players]
    .map(p=>({p, k:calcKPIs(p.seasons.flatMap(s=>s.games))}))
    .filter(x=>x.k.gp>0)
    .sort((a,b)=>parseFloat(b.k.api)-parseFloat(a.k.api)).slice(0,5);

  return `
    <div class="career-banner mb4">
      <div class="bc-title mb2">Team Overview</div>
      <div class="kpi-grid">
        ${kpiCard('Players',state.players.length,'var(--foam)')}
        ${kpiCard('Total Games',gp,'var(--foam)')}
        ${kpiCard('Total Goals',t.goals,'var(--mint)')}
        ${kpiCard('Shoot %',shootPct==='—'?'—':shootPct+'%','var(--mint)')}
        ${kpiCard('Assists',t.assists,'var(--gold)')}
        ${kpiCard('Steals',t.steals,'var(--gold)')}
        ${kpiCard('Blocks',t.blocks,'var(--foam)')}
        ${kpiCard('Avg API',api,'var(--wave)')}
      </div>
    </div>

    ${state.players.length === 0 ? `<div class="empty"><div class="empty-icon">🤽</div><p>Add players to see team stats.</p></div>` : `
    <div class="panel mb3">
      <div class="panel-title">Top Goal Scorers</div>
      ${topScorers.map(({p,k},i)=>`
        <div class="row-between mb2" style="padding-bottom:8px;border-bottom:1px solid var(--line)">
          <div class="row" style="gap:10px;min-width:0;flex:1">
            <span style="font-family:'Barlow Condensed',sans-serif;font-size:20px;color:${i===0?'var(--gold)':'var(--sub)'};width:22px">${i+1}</span>
            <div style="min-width:0">
              <div class="text-bold" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
              <div class="text-xs text-sub">${p.position} · ${k.gp} GP</div>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;color:var(--mint)">${k.t.goals}</div>
            <div class="text-xs text-sub">${k.shootPct==='—'?'':k.shootPct+'%'}</div>
          </div>
        </div>`).join('')}
    </div>
    <div class="panel">
      <div class="panel-title">Top API Performers</div>
      ${topAPI.map(({p,k},i)=>`
        <div class="row-between mb2" style="padding-bottom:8px;border-bottom:1px solid var(--line)">
          <div class="row" style="gap:10px;min-width:0;flex:1">
            <span style="font-family:'Barlow Condensed',sans-serif;font-size:20px;color:${i===0?'var(--gold)':'var(--sub)'};width:22px">${i+1}</span>
            <div style="min-width:0">
              <div class="text-bold" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
              <div class="text-xs text-sub">${p.position} · ${k.gp} GP</div>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;color:var(--gold)">${k.api}</div>
            <div class="text-xs text-sub">API</div>
          </div>
        </div>`).join('')}
    </div>`}`;
}

// ── PLAYER DETAIL ─────────────────────────────────────────────────────────────
function openPlayer(id) {
  state.selectedPlayerId = id;
  state.selectedSeasonId = null;
  const p = state.players.find(x=>x.id===id);
  state.careerSelected = new Set(p.seasons.map(s=>s.id));
  state.page = 'player';
  render();
}

function renderPlayerDetail() {
  const p = state.players.find(x=>x.id===state.selectedPlayerId);
  if (!p) return '';

  const seasonNav = `
    <div class="panel mb3">
      <div class="panel-title" style="margin-bottom:10px">Seasons</div>
      <div class="s-pills">
        <button class="s-pill ${state.selectedSeasonId===null?'on':''}" onclick="selectSeason(null)">🏆 Career</button>
        ${p.seasons.map(s=>`
          <button class="s-pill ${state.selectedSeasonId===s.id?'on':''}" onclick="selectSeason('${s.id}')">
            ${typeDot(s.type)}${s.label}
          </button>`).join('')}
        <button class="btn btn-blue btn-sm" onclick="modalAddSeason()">+ Season</button>
      </div>
    </div>`;

  const content = state.selectedSeasonId === null
    ? renderCareerView(p)
    : renderSeasonView(p, p.seasons.find(s=>s.id===state.selectedSeasonId));

  return `
    <div class="row-between mb3" style="flex-wrap:nowrap">
      <button class="btn btn-ghost btn-sm" onclick="showPage('roster')">← Roster</button>
      <div class="row" style="min-width:0;flex:1;padding:0 10px">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;color:var(--wave);line-height:1;flex-shrink:0">#${p.number||'?'}</span>
        <div style="min-width:0">
          <div style="font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
          <div class="text-xs text-sub" style="text-transform:uppercase;letter-spacing:1px">${p.position}</div>
        </div>
      </div>
    </div>
    ${seasonNav}
    ${content}`;
}

function selectSeason(id) {
  state.selectedSeasonId = id;
  render();
}

// ── SEASON VIEW ───────────────────────────────────────────────────────────────
function renderSeasonView(p, season) {
  if (!season) return '';
  const {t,gp,shootPct,savePct,api,opi,dpi} = calcKPIs(season.games);

  const tabs = ['overview','stats','swim','games'];
  const activeTab = window._seasonTab || 'overview';

  const tabBar = `<div class="tab-bar">
    ${tabs.map(tab=>`<button class="tab-btn ${activeTab===tab?'on':''}" onclick="setSeasonTab('${tab}')">${tab.charAt(0).toUpperCase()+tab.slice(1)}</button>`).join('')}
  </div>`;

  let content = '';
  if (activeTab==='overview') {
    content = `
      <div class="panel mb3"><div class="panel-title">Offense</div><div class="stat-grid">
        ${STAT_FIELDS.filter(f=>f.cat==='offense').map(f=>statCard(f.label,t[f.key])).join('')}
        ${statCard('Shooting %',shootPct==='—'?'—':shootPct+'%')}
      </div></div>
      <div class="panel"><div class="panel-title">Defense</div><div class="stat-grid">
        ${STAT_FIELDS.filter(f=>f.cat==='defense').map(f=>statCard(f.label,t[f.key])).join('')}
        ${statCard('Save %',savePct==='—'?'—':savePct+'%')}
      </div></div>`;
  } else if (activeTab==='stats') {
    content = `<div class="panel"><div class="panel-title">All Stats</div><div class="stat-grid">
      ${STAT_FIELDS.map(f=>statCard(f.label,t[f.key])).join('')}
      ${statCard('Shooting %',shootPct==='—'?'—':shootPct+'%')}
      ${statCard('Save %',savePct==='—'?'—':savePct+'%')}
      ${statCard('API',api)} ${statCard('OPI',opi)} ${statCard('DPI',dpi)}
    </div></div>`;
  } else if (activeTab==='swim') {
    content = `<div class="panel"><div class="panel-title">Swim Times</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Event</th><th>Best</th><th>#</th><th>History</th></tr></thead>
        <tbody>${SWIM_EVENTS.map(ev=>{
          const entries = season.swimTimes[ev]||[];
          const best = bestTime(entries);
          const sorted = [...entries].sort((a,b)=>new Date(b.date)-new Date(a.date));
          return `<tr>
            <td style="font-weight:700">${ev}</td>
            <td>${best?`<span class="swim-best">${best.toFixed(2)}s</span>`:'—'}</td>
            <td>${entries.length}</td>
            <td>${sorted.map(e=>`<span class="chip ${e.time===best?'chip-green':'chip-gray'}" style="margin:2px;cursor:pointer" onclick="deleteSwimTime('${season.id}','${ev}','${e.id}')" title="${e.date}">${e.time.toFixed(2)}s</span>`).join('')||'—'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
  } else if (activeTab==='games') {
    content = season.games.length===0
      ? `<div class="empty"><div class="empty-icon">🏊</div><p>No games yet. Hit + Game!</p></div>`
      : [...season.games].reverse().map(g=>{
          const gk = calcKPIs([g]);
          return `<div class="g-entry">
            <div class="g-header">
              <div><span style="font-weight:700;font-size:15px">vs ${g.opponent}</span> <span class="text-xs text-sub">${g.date}</span></div>
              <button class="btn btn-red btn-xs" onclick="deleteGame('${season.id}','${g.id}')">Remove</button>
            </div>
            <div class="stat-grid">${STAT_FIELDS.slice(0,10).map(f=>statCard(f.label,g.stats[f.key])).join('')}${statCard('Shoot%',gk.shootPct==='—'?'—':gk.shootPct+'%')}</div>
          </div>`;
        }).join('');
  }

  return `
    <div class="s-header mb3">
      <div class="s-header-top">
        <div>
          <div class="row mb2">${typeBadge(season.type)} <span style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900">${season.label}</span></div>
          <div class="text-xs text-sub">${season.startDate&&season.endDate?season.startDate+' → '+season.endDate:season.notes||'No dates set'}</div>
        </div>
        <div class="s-actions">
          <button class="btn btn-blue btn-sm" onclick="modalLogGame('${season.id}')">+ Game</button>
          <button class="btn btn-green btn-sm" onclick="modalLogSwim('${season.id}')">+ Swim</button>
          <button class="btn btn-red btn-sm" onclick="deleteSeason('${season.id}')">Delete</button>
        </div>
      </div>
    </div>
    <div class="kpi-grid mb3">
      ${kpiCard('Games',gp,'var(--wave)')}
      ${kpiCard('Goals',t.goals,'var(--mint)')}
      ${kpiCard('Shoot%',shootPct==='—'?'—':shootPct+'%','var(--mint)')}
      ${kpiCard('Assists',t.assists,'var(--foam)')}
      ${kpiCard('Steals',t.steals,'var(--gold)')}
      ${kpiCard('Blocks',t.blocks,'var(--foam)')}
      ${kpiCard('API',api,'var(--gold)')}
      ${kpiCard('OPI',opi,'var(--wave)')}
      ${kpiCard('DPI',dpi,'var(--mint)')}
    </div>
    ${tabBar}${content}`;
}

function setSeasonTab(tab) { window._seasonTab = tab; render(); }

// ── CAREER VIEW ───────────────────────────────────────────────────────────────
function renderCareerView(p) {
  if (p.seasons.length===0) return `<div class="empty"><div class="empty-icon">📅</div><p>No seasons yet. Add one above!</p></div>`;

  const active = p.seasons.filter(s=>state.careerSelected.has(s.id));
  const allGames = active.flatMap(s=>s.games);
  const {t,gp,shootPct,savePct,api,opi,dpi} = calcKPIs(allGames);

  const swimBests = {};
  SWIM_EVENTS.forEach(ev=>{
    const all = active.flatMap(s=>s.swimTimes[ev]||[]);
    swimBests[ev] = bestTime(all);
  });

  const toggleBtns = p.seasons.map(s=>`
    <button class="s-pill ${state.careerSelected.has(s.id)?'on':''}" onclick="toggleCareerSeason('${s.id}')">
      ${typeDot(s.type)}${s.label} (${s.games.length}G)
    </button>`).join('');

  const breakdown = active.map(s=>{
    const k = calcKPIs(s.games);
    return `<tr>
      <td style="font-weight:700;white-space:nowrap">${s.label}</td>
      <td>${typeBadge(s.type)}</td>
      <td>${k.gp}</td>
      <td class="hi">${k.t.goals}</td>
      <td>${k.t.assists}</td>
      <td>${k.shootPct==='—'?'—':k.shootPct+'%'}</td>
      <td>${k.t.steals}</td>
      <td class="gold">${k.api}</td>
    </tr>`;
  }).join('');

  return `
    <div class="career-banner mb3">
      <div class="row-between mb3">
        <div>
          <div class="bc-title">Career Stats</div>
          <div class="text-xs text-sub">${active.length}/${p.seasons.length} seasons · ${allGames.length} games</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="toggleAllSeasons()">
          ${state.careerSelected.size===p.seasons.length?'Deselect All':'Select All'}
        </button>
      </div>
      <div class="s-pills">${toggleBtns}</div>
    </div>

    ${active.length===0?`<div class="empty"><p>Select at least one season above.</p></div>`:`
    <div class="kpi-grid mb3">
      ${kpiCard('Games',gp,'var(--wave)')}
      ${kpiCard('Goals',t.goals,'var(--mint)')}
      ${kpiCard('Assists',t.assists,'var(--foam)')}
      ${kpiCard('Shoot%',shootPct==='—'?'—':shootPct+'%','var(--mint)')}
      ${kpiCard('Steals',t.steals,'var(--gold)')}
      ${kpiCard('Blocks',t.blocks,'var(--foam)')}
      ${kpiCard('API',api,'var(--gold)')}
      ${kpiCard('OPI',opi,'var(--wave)')}
      ${kpiCard('DPI',dpi,'var(--mint)')}
      ${kpiCard('Save%',savePct==='—'?'—':savePct+'%','var(--rose)')}
    </div>

    <div class="panel mb3">
      <div class="panel-title">Season Breakdown</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Season</th><th>Type</th><th>GP</th><th>Goals</th><th>Ast</th><th>Shoot%</th><th>Steals</th><th>API</th></tr></thead>
        <tbody>
          ${breakdown}
          <tr style="border-top:2px solid var(--wave);background:rgba(2,132,199,.05)">
            <td style="font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:1px">TOTAL</td>
            <td></td>
            <td style="font-weight:700">${gp}</td>
            <td class="hi" style="font-weight:900">${t.goals}</td>
            <td style="font-weight:700">${t.assists}</td>
            <td style="font-weight:700">${shootPct==='—'?'—':shootPct+'%'}</td>
            <td style="font-weight:700">${t.steals}</td>
            <td class="gold" style="font-weight:900">${api}</td>
          </tr>
        </tbody>
      </table></div>
    </div>

    <div class="panel mb3">
      <div class="panel-title">Career Swim Bests</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Event</th><th>Career Best</th>${active.map(s=>`<th>${s.label}</th>`).join('')}</tr></thead>
        <tbody>${SWIM_EVENTS.map(ev=>{
          const cb = swimBests[ev];
          return `<tr>
            <td style="font-weight:700">${ev}</td>
            <td>${cb?`<span class="swim-best">${cb.toFixed(2)}s</span>`:'—'}</td>
            ${active.map(s=>{const b=bestTime(s.swimTimes[ev]||[]);return`<td>${b?`<span ${b===cb?'class="swim-best"':''}>${b.toFixed(2)}s</span>`:'—'}</td>`;}).join('')}
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>

    <div class="panel">
      <div class="panel-title">Career Stat Totals</div>
      <div class="stat-grid">${STAT_FIELDS.map(f=>statCard(f.label,t[f.key])).join('')}</div>
    </div>`}`;
}

function toggleCareerSeason(id) {
  if (state.careerSelected.has(id)) state.careerSelected.delete(id);
  else state.careerSelected.add(id);
  render();
}
function toggleAllSeasons() {
  const p = state.players.find(x=>x.id===state.selectedPlayerId);
  if (!p) return;
  if (state.careerSelected.size===p.seasons.length) state.careerSelected = new Set();
  else state.careerSelected = new Set(p.seasons.map(s=>s.id));
  render();
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('overlay').classList.remove('hidden');
}
function closeModal(e) {
  if (!e || e.target===document.getElementById('overlay')) {
    document.getElementById('overlay').classList.add('hidden');
  }
}

function modalAddPlayer() {
  openModal(`
    <div class="modal-title">Add Player</div>
    <div class="f-grid mb3">
      <div class="f-group"><label class="f-label">Full Name</label><input class="f-input" id="pm-name" placeholder="e.g. Jordan Smith"></div>
      <div class="f-group"><label class="f-label">Cap #</label><input class="f-input" id="pm-num" type="number" placeholder="#"></div>
      <div class="f-group"><label class="f-label">Position</label><select class="f-input" id="pm-pos">${POSITIONS.map(p=>`<option>${p}</option>`).join('')}</select></div>
    </div>
    <div class="row" style="gap:8px">
      <button class="btn btn-blue" onclick="saveNewPlayer()">Add Player</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

function saveNewPlayer() {
  const name = document.getElementById('pm-name').value.trim();
  if (!name) return;
  state.players.push({id:uid(),name,number:document.getElementById('pm-num').value,position:document.getElementById('pm-pos').value,seasons:[]});
  save(); closeModal(); render();
}

function modalEditPlayer(id) {
  const p = state.players.find(x=>x.id===id);
  openModal(`
    <div class="modal-title">Edit Player</div>
    <div class="f-grid mb3">
      <div class="f-group"><label class="f-label">Full Name</label><input class="f-input" id="pm-name" value="${p.name}"></div>
      <div class="f-group"><label class="f-label">Cap #</label><input class="f-input" id="pm-num" type="number" value="${p.number||''}"></div>
      <div class="f-group"><label class="f-label">Position</label><select class="f-input" id="pm-pos">${POSITIONS.map(pos=>`<option ${pos===p.position?'selected':''}>${pos}</option>`).join('')}</select></div>
    </div>
    <div class="row" style="gap:8px">
      <button class="btn btn-blue" onclick="saveEditPlayer('${id}')">Save</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

function saveEditPlayer(id) {
  const p = state.players.find(x=>x.id===id);
  p.name = document.getElementById('pm-name').value.trim()||p.name;
  p.number = document.getElementById('pm-num').value;
  p.position = document.getElementById('pm-pos').value;
  save(); closeModal(); render();
}

function deletePlayer(id) {
  if (confirm('Delete this player and all their data?')) {
    state.players = state.players.filter(p=>p.id!==id);
    save(); render();
  }
}

function modalAddSeason() {
  const yr = new Date().getFullYear();
  openModal(`
    <div class="modal-title">Add Season</div>
    <div class="col mb3" style="gap:12px">
      <div class="f-group"><label class="f-label">Season Label</label><input class="f-input" id="sm-label" value="${yr}-${String(yr+1).slice(2)} Season"></div>
      <div class="f-group"><label class="f-label">Season Type</label>
        <select class="f-input" id="sm-type">
          <option value="junior">Junior (development)</option>
          <option value="senior">Senior</option>
          <option value="professional">Professional</option>
          <option value="standard" selected>Standard</option>
        </select>
      </div>
      <div class="f-grid-2">
        <div class="f-group"><label class="f-label">Start Date</label><input type="date" class="f-input" id="sm-start"></div>
        <div class="f-group"><label class="f-label">End Date</label><input type="date" class="f-input" id="sm-end"></div>
      </div>
      <div class="f-group"><label class="f-label">Notes</label><input class="f-input" id="sm-notes" placeholder="e.g. National Championship year"></div>
    </div>
    <div class="row" style="gap:8px">
      <button class="btn btn-blue" onclick="saveNewSeason()">Create Season</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

function saveNewSeason() {
  const p = state.players.find(x=>x.id===state.selectedPlayerId);
  const label = document.getElementById('sm-label').value.trim();
  if (!label) return;
  const s = {
    id:uid(), label, type:document.getElementById('sm-type').value,
    startDate:document.getElementById('sm-start').value,
    endDate:document.getElementById('sm-end').value,
    notes:document.getElementById('sm-notes').value,
    games:[], swimTimes:Object.fromEntries(SWIM_EVENTS.map(e=>[e,[]]))
  };
  p.seasons.push(s);
  state.careerSelected.add(s.id);
  state.selectedSeasonId = s.id;
  window._seasonTab = 'overview';
  save(); closeModal(); render();
}

function deleteSeason(sid) {
  if (!confirm('Delete this season and all its data?')) return;
  const p = state.players.find(x=>x.id===state.selectedPlayerId);
  p.seasons = p.seasons.filter(s=>s.id!==sid);
  state.selectedSeasonId = null;
  save(); render();
}

function modalLogGame(sid) {
  const today = new Date().toISOString().slice(0,10);
  const fields = ['offense','defense','general'].map(cat=>`
    <div class="cat-badge cat-${cat}">${cat}</div>
    <div class="stat-grid mb2">${STAT_FIELDS.filter(f=>f.cat===cat).map(f=>`
      <div class="f-group"><label class="f-label">${f.label}</label>
        <input type="number" min="0" class="f-input" id="gm-${f.key}" value="0">
      </div>`).join('')}
    </div>`).join('');

  openModal(`
    <div class="modal-title">Log Game</div>
    <div class="f-grid mb3">
      <div class="f-group"><label class="f-label">Date</label><input type="date" class="f-input" id="gm-date" value="${today}"></div>
      <div class="f-group"><label class="f-label">Opponent</label><input class="f-input" id="gm-opp" placeholder="Team name"></div>
    </div>
    <div class="div"></div>
    ${fields}
    <div class="row" style="gap:8px;margin-top:12px">
      <button class="btn btn-green" onclick="saveGame('${sid}')">Save Game</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

function saveGame(sid) {
  const opp = document.getElementById('gm-opp').value.trim();
  if (!opp) return;
  const p = state.players.find(x=>x.id===state.selectedPlayerId);
  const s = p.seasons.find(x=>x.id===sid);
  const stats = emptyStats();
  STAT_FIELDS.forEach(f=>{ stats[f.key] = parseInt(document.getElementById('gm-'+f.key).value)||0; });
  s.games.push({id:uid(), date:document.getElementById('gm-date').value, opponent:opp, stats});
  save(); closeModal(); render();
}

function deleteGame(sid, gid) {
  if (!confirm('Remove this game?')) return;
  const p = state.players.find(x=>x.id===state.selectedPlayerId);
  const s = p.seasons.find(x=>x.id===sid);
  s.games = s.games.filter(g=>g.id!==gid);
  save(); render();
}

function modalLogSwim(sid) {
  const today = new Date().toISOString().slice(0,10);
  openModal(`
    <div class="modal-title">Log Swim Time</div>
    <div class="col mb3" style="gap:12px">
      <div class="f-group"><label class="f-label">Event</label>
        <select class="f-input" id="sw-event">${SWIM_EVENTS.map(e=>`<option>${e}</option>`).join('')}</select>
      </div>
      <div class="f-group"><label class="f-label">Time (seconds, e.g. 24.85)</label>
        <input type="number" step="0.01" min="0" class="f-input" id="sw-time" placeholder="0.00">
      </div>
      <div class="f-group"><label class="f-label">Date</label>
        <input type="date" class="f-input" id="sw-date" value="${today}">
      </div>
    </div>
    <div class="row" style="gap:8px">
      <button class="btn btn-green" onclick="saveSwim('${sid}')">Save Time</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

function saveSwim(sid) {
  const t = parseFloat(document.getElementById('sw-time').value);
  if (isNaN(t)||t<=0) return;
  const p = state.players.find(x=>x.id===state.selectedPlayerId);
  const s = p.seasons.find(x=>x.id===sid);
  const ev = document.getElementById('sw-event').value;
  s.swimTimes[ev].push({id:uid(), time:t, date:document.getElementById('sw-date').value});
  save(); closeModal(); render();
}

function deleteSwimTime(sid, ev, tid) {
  if (!confirm('Delete this time?')) return;
  const p = state.players.find(x=>x.id===state.selectedPlayerId);
  const s = p.seasons.find(x=>x.id===sid);
  s.swimTimes[ev] = s.swimTimes[ev].filter(t=>t.id!==tid);
  save(); render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
