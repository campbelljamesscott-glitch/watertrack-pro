<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WaterTrack">
<meta name="theme-color" content="#07111e">
<title>WaterTrack Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Karla:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#07111e;overflow-x:hidden;height:100%}
body{font-family:'Karla',sans-serif;font-size:14px;line-height:1.5;background:#07111e;color:#e0eaf4;overflow-x:hidden;min-height:100%;-webkit-text-size-adjust:100%}
:root{
  --ink:#07111e;--deep:#0b1a2d;--panel:#0f2239;--raised:#162c44;
  --line:#1e3a58;--wave:#0284c7;--foam:#38bdf8;--mint:#10b981;
  --gold:#f59e0b;--rose:#f43f5e;--txt:#e0eaf4;--sub:#7ca0be;
  --brand:#0284c7;--brand2:#10b981;--brandbg:#07111e;
}
input,select,button,textarea{font-family:'Karla',sans-serif;-webkit-appearance:none}
button{cursor:pointer;border:none}

#app{display:flex;flex-direction:column;min-height:100vh;width:100%;overflow-x:hidden}

/* AUTH */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--ink)}
.auth-box{background:var(--deep);border:1px solid var(--line);border-radius:20px;padding:28px 22px;width:100%;max-width:380px}
.auth-logo{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;letter-spacing:3px;color:var(--foam);text-transform:uppercase;text-align:center;margin-bottom:4px}
.auth-logo b{color:var(--mint)}
.auth-sub{text-align:center;color:var(--sub);font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-bottom:24px}
.auth-tabs{display:flex;background:var(--raised);border-radius:8px;padding:3px;margin-bottom:20px}
.auth-tab{flex:1;padding:8px;border-radius:6px;border:none;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--sub);background:transparent;cursor:pointer}
.auth-tab.on{background:var(--wave);color:#fff}
.auth-err{background:rgba(244,63,94,.1);border:1px solid var(--rose);border-radius:8px;padding:10px 12px;color:var(--rose);font-size:12px;margin-bottom:12px}
.auth-ok{background:rgba(16,185,129,.1);border:1px solid var(--mint);border-radius:8px;padding:10px 12px;color:var(--mint);font-size:12px;margin-bottom:12px}

/* CLUB PICKER */
#club-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--ink)}
.club-box{background:var(--deep);border:1px solid var(--line);border-radius:20px;padding:24px 18px;width:100%;max-width:440px}

/* TOPBAR */
#topbar{
  background:linear-gradient(90deg,var(--brandbg),color-mix(in srgb,var(--brandbg) 70%,#000));
  border-bottom:2px solid var(--brand);
  padding:12px 14px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;width:100%;
}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:2px;color:var(--foam);text-transform:uppercase;white-space:nowrap;min-width:0;overflow:hidden;text-overflow:ellipsis}
.logo b{color:var(--brand2)}
.club-logo-img{height:32px;width:32px;border-radius:6px;object-fit:cover;flex-shrink:0}
.nav{display:flex;gap:3px;margin-left:auto;align-items:center;flex-shrink:0}
.nav-btn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);background:transparent;border:none;cursor:pointer;white-space:nowrap}
.nav-btn.on{background:var(--brand);color:#fff}
.nav-btn.signout{color:var(--rose);border:1px solid rgba(244,63,94,.3);padding:4px 8px;font-size:10px}
.nav-btn.switch-club{color:var(--foam);border:1px solid rgba(56,189,248,.3);padding:4px 8px;font-size:10px}

/* MAIN */
#main{flex:1;padding:14px;width:100%;overflow-x:hidden}

/* PANELS */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;width:100%}
.panel-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--foam);text-transform:uppercase;margin-bottom:12px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%}
@media(min-width:400px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:600px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:12px 8px;text-align:center;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kpi-color,var(--brand))}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;line-height:1;color:var(--kpi-color,var(--foam))}
.kpi-label{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-top:3px}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;width:100%}
@media(min-width:400px){.stat-grid{grid-template-columns:repeat(3,1fr)}}
.stat{background:var(--raised);border:1px solid var(--line);border-radius:8px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center;min-width:0}
.stat-label{font-size:10px;color:var(--sub);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:4px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--txt);flex-shrink:0}

/* PLAYER ROW */
.p-list{display:flex;flex-direction:column;gap:6px;width:100%}
.p-row{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;width:100%;cursor:pointer;-webkit-tap-highlight-color:transparent}
.p-row.sel{border-color:var(--brand);background:#0e2540}
.p-num{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--brand);width:30px;text-align:center;line-height:1;flex-shrink:0}
.p-info{flex:1;min-width:0}
.p-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-pos{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.8px}
.p-chips{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.p-actions{display:flex;gap:4px;flex-shrink:0}

/* CHIPS */
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;border:1px solid transparent}
.chip-blue{background:rgba(2,132,199,.15);color:var(--foam);border-color:rgba(2,132,199,.3)}
.chip-green{background:rgba(16,185,129,.15);color:var(--mint);border-color:rgba(16,185,129,.3)}
.chip-gold{background:rgba(245,158,11,.15);color:var(--gold);border-color:rgba(245,158,11,.3)}
.chip-gray{background:rgba(124,160,190,.1);color:var(--sub);border-color:rgba(124,160,190,.2)}
.chip-red{background:rgba(244,63,94,.15);color:var(--rose);border-color:rgba(244,63,94,.3)}
.chip-brand{background:rgba(2,132,199,.15);color:var(--brand);border-color:var(--brand)}

/* SEASON PILLS */
.s-pills{display:flex;flex-wrap:wrap;gap:6px}
.s-pill{padding:5px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;border:1px solid var(--line);background:var(--raised);color:var(--sub);white-space:nowrap;-webkit-tap-highlight-color:transparent}
.s-pill.on{background:var(--brand);border-color:var(--brand);color:#fff}

/* TABS */
.tab-bar{display:flex;gap:3px;background:var(--raised);padding:4px;border-radius:9px;width:100%;margin-bottom:14px}
.tab-btn{flex:1;padding:8px 4px;border-radius:6px;border:none;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);background:transparent;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.tab-btn.on{background:var(--brand);color:#fff}

/* BUTTONS */
.btn{padding:8px 14px;border-radius:7px;border:none;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn-brand{background:var(--brand);color:#fff}
.btn-green{background:var(--mint);color:#07111e}
.btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--line)}
.btn-red{background:transparent;color:var(--rose);border:1px solid var(--rose)}
.btn-gold{background:var(--gold);color:#07111e}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}

/* FORMS */
.f-group{display:flex;flex-direction:column;gap:5px;width:100%}
.f-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px}
.f-input{background:var(--raised);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:10px 12px;font-size:16px;width:100%;-webkit-appearance:none}
.f-input:focus{outline:none;border-color:var(--brand)}
.f-grid{display:grid;grid-template-columns:1fr;gap:10px;width:100%}
@media(min-width:400px){.f-grid{grid-template-columns:repeat(2,1fr)}}
.f-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%}
.color-row{display:flex;align-items:center;gap:10px}
.color-swatch{width:36px;height:36px;border-radius:8px;border:2px solid var(--line);flex-shrink:0;cursor:pointer;-webkit-appearance:none;padding:0}
input[type=color]{width:36px;height:36px;border-radius:8px;border:2px solid var(--line);padding:2px;background:var(--raised);cursor:pointer}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--deep);border:1px solid var(--line);border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideUp .22s ease}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:2px;color:var(--foam);text-transform:uppercase;margin-bottom:16px}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}

/* MEMBER ROW */
.member-row{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.member-avatar{width:34px;height:34px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:#fff;flex-shrink:0}

/* BRAND PREVIEW */
.brand-preview{border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px}

/* MISC */
.career-banner{background:linear-gradient(135deg,#0a1e33,#071629,#0b2240);border:1px solid var(--brand);border-radius:14px;padding:14px;margin-bottom:14px;width:100%}
.g-entry{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px;width:100%}
.g-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.s-header{background:linear-gradient(135deg,var(--raised),#102237);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px;width:100%}
.s-header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.s-actions{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.div{height:1px;background:var(--line);margin:14px 0}
.empty{text-align:center;padding:32px 16px;color:var(--sub)}
.empty-icon{font-size:40px;margin-bottom:10px}
.swim-best{color:var(--mint);font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:18px}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.cat-offense{background:rgba(2,132,199,.15);color:var(--foam)}
.cat-defense{background:rgba(16,185,129,.15);color:var(--mint)}
.cat-general{background:rgba(245,158,11,.15);color:var(--gold)}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:6px}
.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}
.text-xs{font-size:11px}.text-sub{color:var(--sub)}.text-bold{font-weight:700}
.bc-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:2px;color:var(--foam)}
.hidden{display:none!important}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px 20px;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:12px}
.tdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.tdot.junior{background:var(--sub)}.tdot.senior{background:var(--mint)}.tdot.professional{background:var(--gold)}.tdot.standard{background:var(--foam)}
.admin-badge{background:rgba(245,158,11,.15);color:var(--gold);border:1px solid rgba(245,158,11,.3);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase}
.coach-badge{background:rgba(56,189,248,.15);color:var(--foam);border:1px solid rgba(56,189,248,.3);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase}
/* SUPER ADMIN */
#superadmin-screen{min-height:100vh;display:flex;flex-direction:column;background:#0a0a0f;color:#e0eaf4;overflow-x:hidden}
.sa-topbar{background:linear-gradient(90deg,#1a0a2e,#0d0520);border-bottom:2px solid #7c3aed;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.sa-logo{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:2px;color:#a78bfa;text-transform:uppercase}
.sa-badge{background:rgba(124,58,237,.2);color:#a78bfa;border:1px solid rgba(124,58,237,.4);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.sa-main{flex:1;padding:16px;max-width:900px;width:100%;margin:0 auto}
.sa-panel{background:#12091f;border:1px solid #2d1f4a;border-radius:14px;padding:14px;margin-bottom:12px}
.sa-panel-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;color:#a78bfa;text-transform:uppercase;margin-bottom:12px}
.sa-club-row{background:#1a0f2e;border:1px solid #2d1f4a;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px}
.sa-club-row:active{border-color:#7c3aed}
.sa-user-row{background:#1a0f2e;border:1px solid #2d1f4a;border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.sa-stat{background:#1a0f2e;border:1px solid #2d1f4a;border-radius:8px;padding:10px 12px;text-align:center}
.sa-stat-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:#a78bfa}
.sa-stat-label{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.sa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:400px){.sa-grid{grid-template-columns:repeat(4,1fr)}}
.impersonate-banner{background:linear-gradient(90deg,#1a0a2e,#0d0520);border-bottom:3px solid #7c3aed;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.impersonate-label{font-size:11px;color:#a78bfa;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.btn-purple{background:#7c3aed;color:#fff;padding:6px 14px;border-radius:7px;border:none;font-size:11px;font-weight:700;text-transform:uppercase;cursor:pointer;white-space:nowrap}
/* PLAYER DASHBOARD */
.p-hero{background:linear-gradient(135deg,var(--deep),var(--panel));border:1px solid var(--brand);border-radius:16px;padding:20px 16px;margin-bottom:14px;width:100%;position:relative;overflow:hidden}
.p-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--brand),var(--brand2))}
.p-hero-num{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:900;color:var(--brand);opacity:.15;position:absolute;right:10px;top:0;line-height:1}
.p-tab-bar{display:flex;gap:3px;background:var(--raised);padding:4px;border-radius:9px;width:100%;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.compare-row{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.compare-bar-wrap{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.compare-bar{height:100%;border-radius:3px;background:var(--brand);transition:width .3s}
.compare-bar.me{background:var(--mint)}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">Water<b>Track</b></div>
    <div class="auth-sub">Pro Performance Tracker</div>
    <div class="auth-tabs">
      <button class="auth-tab on" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Sign Up</button>
    </div>
    <div id="auth-msg"></div>
    <div class="col" style="gap:12px">
      <div class="f-group"><label class="f-label">Email</label><input class="f-input" type="email" id="auth-email" placeholder="your@email.com"></div>
      <div class="f-group"><label class="f-label">Password</label><input class="f-input" type="password" id="auth-password" placeholder="••••••••"></div>
      <button class="btn btn-brand" id="auth-btn" onclick="handleAuth()" style="width:100%;margin-top:4px">Sign In</button>
    </div>
  </div>
</div>

<!-- CLUB PICKER -->
<div id="club-screen" class="hidden">
  <div class="club-box">
    <div class="auth-logo" style="margin-bottom:16px">Water<b>Track</b></div>
    <div id="club-list-area"></div>
    <div class="div"></div>
    <button class="btn btn-brand" style="width:100%" onclick="modalCreateClub()">+ Create New Club</button>
    <button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="signOut()">Sign Out</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
  <header id="topbar">
    <img id="club-logo" class="club-logo-img hidden" src="" alt="logo">
    <div class="logo" id="club-name-display">Water<b>Track</b></div>
    <nav class="nav" id="main-nav">
      <button class="nav-btn" id="nav-dashboard" onclick="showPage('dashboard')">Dashboard</button>
      <button class="nav-btn on" id="nav-roster" onclick="showPage('roster')">Roster</button>
      <button class="nav-btn" id="nav-match" onclick="showPage('match')">Match</button>
      <button class="nav-btn" id="nav-admin" onclick="showPage('admin')" style="display:none">Club</button>
      <button class="nav-btn switch-club" onclick="switchClub()">⇄</button>
      <button class="nav-btn signout" onclick="signOut()">Out</button>
    </nav>
  </header>
  <main id="main"><div class="loading"><div class="spinner"></div><span>Loading...</span></div></main>
</div>

<!-- SUPER ADMIN SCREEN -->
<div id="superadmin-screen" class="hidden">
  <div class="sa-topbar">
    <div class="sa-logo">⚡ WaterTrack</div>
    <span class="sa-badge">Super Admin</span>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn-purple" onclick="exitSuperAdmin()">Exit SA</button>
      <button class="btn-purple" style="background:rgba(244,63,94,.3);color:var(--rose);border:1px solid var(--rose)" onclick="signOut()">Sign Out</button>
    </div>
  </div>
  <div id="impersonate-banner" class="hidden impersonate-banner">
    <span class="impersonate-label">👁 Viewing as: <span id="impersonate-label-name"></span></span>
    <button class="btn-purple" onclick="stopImpersonating()">← Back to SA</button>
  </div>
  <div class="sa-main" id="sa-main"></div>
</div>

<!-- PLAYER DASHBOARD SCREEN -->
<div id="player-screen" class="hidden">
  <header id="player-topbar" style="background:linear-gradient(90deg,var(--brandbg),#000);border-bottom:2px solid var(--brand);padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;width:100%">

<script>
const {createClient} = supabase;
const sb = createClient('https://aadjopjumraksjgfjfon.supabase.co','sb_publishable_aSrs8uhYDi4Y-oiH66UaJA_9IZ2tIiu');

const POSITIONS = ['Goalkeeper','Center','Driver','Wing','Utility','Point'];
const SWIM_EVENTS = ['50 Free','100 Free','50 Breast','50 Back'];
const STAT_FIELDS = [
  {key:'goals',label:'Goals',cat:'offense'},{key:'attempts',label:'Attempts',cat:'offense'},
  {key:'missedShots',label:'Missed Shots',cat:'offense'},{key:'penaltyGoals',label:'Penalty Goals',cat:'offense'},
  {key:'powerPlayGoals',label:'Power Play Goals',cat:'offense'},{key:'counterAttackGoals',label:'Counter-Attack G',cat:'offense'},
  {key:'assists',label:'Assists',cat:'offense'},{key:'blocks',label:'Blocks',cat:'defense'},
  {key:'steals',label:'Steals',cat:'defense'},{key:'goalsAllowed',label:'Goals Allowed',cat:'defense'},
  {key:'earnedExclusions',label:'Earned Exclusions',cat:'defense'},{key:'exclusionsForced',label:'Exclusions Forced',cat:'defense'},
  {key:'sprints',label:'Sprints Won',cat:'general'},{key:'personalFouls',label:'Personal Fouls',cat:'general'},
  {key:'turnovers',label:'Turnovers',cat:'general'},
];
const emptyStats = () => Object.fromEntries(STAT_FIELDS.map(f=>[f.key,0]));

let state = {
  user: null, clubs: [], currentClub: null, myRole: null,
  players: [], page: 'roster',
  selectedPlayerId: null, selectedSeasonId: null, careerSelected: new Set(),
};

// ── AUTH ──────────────────────────────────────────────────────────────────────
let authMode = 'login';
function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('on', mode==='login');
  document.getElementById('tab-signup').classList.toggle('on', mode==='signup');
  document.getElementById('auth-btn').textContent = mode==='login' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-msg').innerHTML = '';
}
async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const msg = document.getElementById('auth-msg');
  if (!email||!password) { msg.innerHTML = '<div class="auth-err">Please enter email and password.</div>'; return; }
  msg.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const result = authMode==='login'
    ? await sb.auth.signInWithPassword({email,password})
    : await sb.auth.signUp({email,password});
  if (result.error) { msg.innerHTML = `<div class="auth-err">${result.error.message}</div>`; }
  else if (authMode==='signup' && !result.data.session) { msg.innerHTML = `<div class="auth-ok">Check your email to confirm, then sign in!</div>`; }
  else { await afterLogin(result.data.user); }
}
async function afterLogin(user) {
  state.user = user;
  document.getElementById('auth-screen').classList.add('hidden');
  await loadClubs();
  if (state.clubs.length === 0) { showClubScreen(); }
  else if (state.clubs.length === 1) { await selectClub(state.clubs[0]); }
  else { showClubScreen(); }
}
async function signOut() {
  await sb.auth.signOut();
  state = {user:null,clubs:[],currentClub:null,myRole:null,players:[],page:'roster',selectedPlayerId:null,selectedSeasonId:null,careerSelected:new Set()};
  document.getElementById('app').classList.add('hidden');
  document.getElementById('club-screen').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
}
function switchClub() {
  document.getElementById('app').classList.add('hidden');
  showClubScreen();
}

sb.auth.onAuthStateChange((event, session) => {
  if (session?.user && !state.user) afterLogin(session.user);
});

// ── CLUBS ─────────────────────────────────────────────────────────────────────
async function loadClubs() {
  // Clubs I created
  const {data: owned} = await sb.from('clubs').select('*').eq('created_by', state.user.id);
  // Clubs I'm a member of
  const {data: memberships} = await sb.from('club_members').select('*, clubs(*)').eq('user_id', state.user.id).eq('status','active');
  const memberClubs = (memberships||[]).map(m => ({...m.clubs, _role: m.role, _team: m.team_name}));
  const ownedWithRole = (owned||[]).map(c => ({...c, _role: 'admin'}));
  // Merge, deduplicate
  const all = [...ownedWithRole];
  memberClubs.forEach(c => { if (!all.find(x=>x.id===c.id)) all.push(c); });
  state.clubs = all;
}

function showClubScreen() {
  document.getElementById('club-screen').classList.remove('hidden');
  const area = document.getElementById('club-list-area');
  if (state.clubs.length === 0) {
    area.innerHTML = `<div class="empty" style="padding:20px 0"><div class="empty-icon">🏊</div><p>No clubs yet.<br>Create one to get started.</p></div>`;
  } else {
    area.innerHTML = `
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--sub);text-transform:uppercase;margin-bottom:10px">Your Clubs</div>
      ${state.clubs.map(c=>`
        <div style="background:var(--raised);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px" onclick="selectClub(${JSON.stringify(c).replace(/"/g,'&quot;')})">
          ${c.logo_url ? `<img src="${c.logo_url}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0">` : `<div style="width:40px;height:40px;border-radius:8px;background:${c.primary_color||'var(--wave)'};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:#fff">${c.name.charAt(0)}</div>`}
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div>
            <div class="text-xs text-sub">${c._role==='admin'?'Admin':'Coach'}</div>
          </div>
          <span style="color:var(--sub);font-size:18px">›</span>
        </div>`).join('')}`;
  }
}

async function selectClub(club) {
  state.currentClub = club;
  state.myRole = club._role || (club.created_by === state.user.id ? 'admin' : 'coach');
  applyBranding(club);
  document.getElementById('club-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  if (state.myRole === 'admin') document.getElementById('nav-admin').style.display = '';
  else document.getElementById('nav-admin').style.display = 'none';
  await loadAllData();
  render();
}

function applyBranding(club) {
  const root = document.documentElement;
  root.style.setProperty('--brand', club.primary_color || '#0284c7');
  root.style.setProperty('--brand2', club.secondary_color || '#10b981');
  root.style.setProperty('--brandbg', club.background_color || '#07111e');
  // Update club name in header
  document.getElementById('club-name-display').innerHTML = club.name;
  // Logo
  const logoEl = document.getElementById('club-logo');
  if (club.logo_url) { logoEl.src = club.logo_url; logoEl.classList.remove('hidden'); }
  else { logoEl.classList.add('hidden'); }
  // Theme color meta
  document.querySelector('meta[name="theme-color"]').setAttribute('content', club.background_color || '#07111e');
}

// ── DATA ──────────────────────────────────────────────────────────────────────
async function loadAllData() {
  let playersQuery = sb.from('players').select('*').order('number');
  if (state.myRole === 'admin') {
    playersQuery = playersQuery.eq('club_id', state.currentClub.id);
  } else {
    playersQuery = playersQuery.eq('club_id', state.currentClub.id).eq('user_id', state.user.id);
  }
  const {data: players} = await playersQuery;
  if (!players || players.length === 0) { state.players = []; return; }
  const playerIds = players.map(p=>p.id);
  const [seasonsRes, gamesRes, swimRes] = await Promise.all([
    sb.from('seasons').select('*').in('player_id', playerIds).order('created_at'),
    sb.from('games').select('*').order('date'),
    sb.from('swim_times').select('*').order('date'),
  ]);
  const seasons = seasonsRes.data||[];
  const games = gamesRes.data||[];
  const swimTimes = swimRes.data||[];
  state.players = players.map(p => ({
    id:p.id, name:p.name, number:p.number||'', position:p.position||'',
    teamName: p.team_name||'', playerEmail: p.player_email||'', userId: p.user_id,
    seasons: seasons.filter(s=>s.player_id===p.id).map(s => ({
      id:s.id, label:s.label, type:s.type||'standard',
      startDate:s.start_date||'', endDate:s.end_date||'', notes:s.notes||'',
      games: games.filter(g=>g.season_id===s.id).map(g=>({id:g.id,date:g.date||'',opponent:g.opponent,stats:g.stats||emptyStats()})),
      swimTimes: Object.fromEntries(SWIM_EVENTS.map(ev=>[ev, swimTimes.filter(t=>t.season_id===s.id&&t.event===ev).map(t=>({id:t.id,time:t.time,date:t.date||''}))]))
    }))
  }));
}

// ── DB OPS ────────────────────────────────────────────────────────────────────

  const {data,error} = await sb.from('players').insert({name,number,position,team_name:teamName,player_email:playerEmail||null,user_id:state.user.id,club_id:state.currentClub.id}).select().single();

}

async function dbDeleteSeason(id) { await sb.from('seasons').delete().eq('id',id); }
async function dbAddGame(seasonId,date,opponent,stats) {

  const {data,error} = await sb.from('swim_times').insert({season_id:seasonId,event,time,date}).select().single();

async function dbDeleteSwimTime(id) { await sb.from('swim_times').delete().eq('id',id); }

// ── KPI ───────────────────────────────────────────────────────────────────────
function aggregate(games) {
  const t = emptyStats();
  games.forEach(g=>STAT_FIELDS.forEach(({key})=>{t[key]+=(g.stats[key]||0);}));
  return t;
}
function calcKPIs(games) {
  const t = aggregate(games), gp = games.length;
  const shootPct = t.attempts>0?((t.goals/t.attempts)*100).toFixed(1):'—';
  const savePct = (t.blocks+t.goalsAllowed)>0?((t.blocks/(t.blocks+t.goalsAllowed))*100).toFixed(1):'—';
  const api = gp>0?((t.goals*3+t.assists*2+t.steals*2+t.blocks*2+t.earnedExclusions-t.turnovers-t.personalFouls)/gp).toFixed(2):'—';
  const opi = gp>0?((t.goals*4+t.assists*2+t.powerPlayGoals*1.5+t.counterAttackGoals*1.5-t.missedShots*0.5-t.turnovers)/gp).toFixed(2):'—';
  const dpi = gp>0?((t.blocks*3+t.steals*2+t.earnedExclusions*1.5+t.exclusionsForced-t.goalsAllowed*0.5-t.personalFouls)/gp).toFixed(2):'—';
  return {t,gp,shootPct,savePct,api,opi,dpi};
}
function bestTime(entries) { if (!entries||!entries.length) return null; return Math.min(...entries.map(e=>e.time)); }

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
const kpiCard = (label,val,color='var(--foam)') => `<div class="kpi" style="--kpi-color:${color}"><div class="kpi-val">${val}</div><div class="kpi-label">${label}</div></div>`;
const statCard = (label,val) => `<div class="stat"><span class="stat-label">${label}</span><span class="stat-val">${val}</span></div>`;
function typeBadge(type) {
  const map={junior:['chip-gray','JR'],senior:['chip-green','SR'],professional:['chip-gold','PRO'],standard:['chip-blue','STD']};
  const [cls,lbl]=map[type]||map.standard;
  return `<span class="chip ${cls}">${lbl}</span>`;
}
const typeDot = type => `<span class="tdot ${type}"></span>`;

// ── PAGES ─────────────────────────────────────────────────────────────────────
function showPage(page) {
  state.page=page; state.selectedPlayerId=null;
  document.getElementById('main-nav').classList.remove('hidden');
  ['dashboard','roster','admin','match'].forEach(p=>{
    const el = document.getElementById('nav-'+p);
    if (el) el.classList.toggle('on',p===page);
  });
  render();
}
async function render() {
  const main = document.getElementById('main');
  if (state.page==='roster') main.innerHTML = renderRoster();
  if (state.page==='match') main.innerHTML = renderMatch();
  else if (state.page==='dashboard') main.innerHTML = renderDashboard();
  else if (state.page==='admin') main.innerHTML = await renderAdmin();
  else if (state.page==='player') { document.getElementById('main-nav').classList.add('hidden'); main.innerHTML = renderPlayerDetail(); }
}

// ── ROSTER ────────────────────────────────────────────────────────────────────
function renderRoster() {
  const sorted = [...state.players].sort((a,b)=>(parseInt(a.number)||99)-(parseInt(b.number)||99));
  // Group by team if admin
  let content = '';
  if (state.myRole==='admin' && sorted.some(p=>p.teamName)) {
    const teams = [...new Set(sorted.map(p=>p.teamName||'No Team'))];
    content = teams.map(team => {
      const teamPlayers = sorted.filter(p=>(p.teamName||'No Team')===team);
      return `<div style="margin-bottom:16px">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--brand);text-transform:uppercase;margin-bottom:8px;padding-left:4px">${team}</div>
        <div class="p-list">${teamPlayers.map(p=>playerRow(p)).join('')}</div>
      </div>`;
    }).join('');
  } else {
    content = sorted.length===0
      ? `<div class="panel"><div class="empty"><div class="empty-icon">👤</div><p>No players yet.<br>Add your first player.</p></div></div>`
      : `<div class="p-list">${sorted.map(p=>playerRow(p)).join('')}</div>`;
  }
  return `
    <div class="row-between mb3">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;color:var(--foam);text-transform:uppercase">Roster (${state.players.length})</span>
      <div style="display:flex;gap:8px"><button class="btn btn-green btn-sm" onclick="modalTeamGame()">+ Team Game</button><button class="btn btn-brand btn-sm" onclick="modalAddPlayer()">+ Player</button></div>
    </div>
    ${content}`;
}
function playerRow(p) {
  const {gp} = calcKPIs(p.seasons.flatMap(s=>s.games));
  return `<div class="p-row" onclick="openPlayer('${p.id}')">
    <div class="p-num">#${p.number||'?'}</div>
    <div class="p-info"><div class="p-name">${p.name}</div><div class="p-pos">${p.position}${p.teamName?` · ${p.teamName}`:''}</div></div>
    <div class="p-chips"><span class="chip chip-blue">${p.seasons.length}S</span><span class="chip chip-gray">${gp}G</span></div>
    <div class="p-actions" onclick="event.stopPropagation()">
      <button class="btn btn-ghost btn-xs" onclick="modalEditPlayer('${p.id}')">✏️</button>
      <button class="btn btn-red btn-xs" onclick="deletePlayer('${p.id}')">✕</button>
    </div>
  </div>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const allGames = state.players.flatMap(p=>p.seasons.flatMap(s=>s.games));
  const {t,gp,shootPct,api} = calcKPIs(allGames);
  const topScorers = [...state.players].map(p=>({p,k:calcKPIs(p.seasons.flatMap(s=>s.games))})).sort((a,b)=>b.k.t.goals-a.k.t.goals).slice(0,5);
  const topAPI = [...state.players].map(p=>({p,k:calcKPIs(p.seasons.flatMap(s=>s.games))})).filter(x=>x.k.gp>0).sort((a,b)=>parseFloat(b.k.api)-parseFloat(a.k.api)).slice(0,5);
  return `
    <div class="career-banner mb4">
      <div class="bc-title mb2">${state.currentClub.name}</div>
      <div class="kpi-grid">
        ${kpiCard('Players',state.players.length,'var(--brand)')}
        ${kpiCard('Total Games',gp,'var(--brand)')}
        ${kpiCard('Total Goals',t.goals,'var(--mint)')}
        ${kpiCard('Shoot %',shootPct==='—'?'—':shootPct+'%','var(--mint)')}
        ${kpiCard('Assists',t.assists,'var(--gold)')}
        ${kpiCard('Steals',t.steals,'var(--gold)')}
        ${kpiCard('Blocks',t.blocks,'var(--foam)')}
        ${kpiCard('Avg API',api,'var(--brand)')}
      </div>
    </div>
    ${state.players.length===0?`<div class="empty"><div class="empty-icon">🤽</div><p>Add players to see team stats.</p></div>`:`
    <div class="panel mb3">
      <div class="panel-title">Top Goal Scorers</div>
      ${topScorers.map(({p,k},i)=>`
        <div class="row-between mb2" style="padding-bottom:8px;border-bottom:1px solid var(--line)">
          <div class="row" style="gap:10px;min-width:0;flex:1">
            <span style="font-family:'Barlow Condensed',sans-serif;font-size:20px;color:${i===0?'var(--gold)':'var(--sub)'};width:22px">${i+1}</span>
            <div style="min-width:0"><div class="text-bold" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div><div class="text-xs text-sub">${p.position}${p.teamName?` · ${p.teamName}`:''} · ${k.gp} GP</div></div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;color:var(--mint)">${k.t.goals}</div>
            <div class="text-xs text-sub">${k.shootPct==='—'?'':k.shootPct+'%'}</div>
          </div>
        </div>`).join('')}
    </div>
    <div class="panel">
      <div class="panel-title">Top API Performers</div>
      ${topAPI.map(({p,k},i)=>`
        <div class="row-between mb2" style="padding-bottom:8px;border-bottom:1px solid var(--line)">
          <div class="row" style="gap:10px;min-width:0;flex:1">
            <span style="font-family:'Barlow Condensed',sans-serif;font-size:20px;color:${i===0?'var(--gold)':'var(--sub)'};width:22px">${i+1}</span>
            <div style="min-width:0"><div class="text-bold" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div><div class="text-xs text-sub">${p.position} · ${k.gp} GP</div></div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;color:var(--gold)">${k.api}</div>
            <div class="text-xs text-sub">API</div>
          </div>
        </div>`).join('')}
    </div>`}`;
}

function previewBrand() {
  const primary = document.getElementById('br-primary').value;
  const secondary = document.getElementById('br-secondary').value;
  const bg = document.getElementById('br-bg').value;
  document.getElementById('br-primary-hex').textContent = primary;
  document.getElementById('br-secondary-hex').textContent = secondary;
  document.getElementById('br-bg-hex').textContent = bg;
  const preview = document.getElementById('brand-preview');
  if (preview) { preview.style.background = bg; preview.style.borderColor = primary; }
}

async function saveBranding() {
  const name = document.getElementById('br-name').value.trim();
  const logo_url = document.getElementById('br-logo').value.trim();
  const primary_color = document.getElementById('br-primary').value;
  const secondary_color = document.getElementById('br-secondary').value;
  const background_color = document.getElementById('br-bg').value;
  const show_comparisons = document.getElementById('br-comparisons').checked;
  if (!name) return;
  const {error} = await sb.from('clubs').update({name,logo_url,primary_color,secondary_color,background_color,show_comparisons}).eq('id',state.currentClub.id);
  if (error) { alert('Error: '+error.message); return; }
  state.currentClub = {...state.currentClub,name,logo_url,primary_color,secondary_color,background_color,show_comparisons};
  applyBranding(state.currentClub);
  alert('Settings saved! ✅');
  render();
}

function modalInvite() {
  openModal(`
    <div class="modal-title">Invite Coach</div>
    <div class="col mb3" style="gap:12px">
      <div class="f-group"><label class="f-label">Coach Email</label><input class="f-input" type="email" id="inv-email" placeholder="coach@email.com"></div>
      <div class="f-group"><label class="f-label">Team Name (optional)</label><input class="f-input" id="inv-team" placeholder="e.g. U16 Boys"></div>
    </div>
    <div class="auth-ok" style="margin-bottom:12px">The coach will need to sign up at this app with the same email address, then they'll see your club.</div>
    <div class="row" style="gap:8px">
      <button class="btn btn-brand" onclick="saveInvite()">Send Invite</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

async function saveInvite() {
  const email = document.getElementById('inv-email').value.trim().toLowerCase();
  const teamName = document.getElementById('inv-team').value.trim();
  if (!email) return;
  // Check if user exists
  const {data: existing} = await sb.from('club_members').select('id').eq('club_id',state.currentClub.id).eq('invited_email',email);
  if (existing && existing.length > 0) { alert('This person is already invited!'); return; }
  const {error} = await sb.from('club_members').insert({club_id:state.currentClub.id,user_id:state.user.id,invited_email:email,team_name:teamName,role:'coach',status:'pending'});
  if (error) { alert('Error: '+error.message); return; }
  closeModal();
  alert(`Invite sent to ${email}! They need to sign up at this app with that email.`);
  render();
}

async function removeMember(id) {
  if (!confirm('Remove this member?')) return;
  await sb.from('club_members').delete().eq('id',id);
  render();
}

async function saveNewClub() {
  const name = document.getElementById('cc-name').value.trim();
  if (!name) return;
  const {data,error} = await sb.from('clubs').insert({
    name, created_by:state.user.id,
    logo_url: document.getElementById('cc-logo').value.trim()||null,

// ── SEASON VIEW ───────────────────────────────────────────────────────────────
function renderSeasonView(p, season) {
  if (!season) return '';
  const {t,gp,shootPct,savePct,api,opi,dpi} = calcKPIs(season.games);
  const activeTab = window._seasonTab||'overview';
  const tabBar = `<div class="tab-bar">${['overview','stats','swim','games'].map(tab=>`<button class="tab-btn ${activeTab===tab?'on':''}" onclick="setSeasonTab('${tab}')">${tab.charAt(0).toUpperCase()+tab.slice(1)}</button>`).join('')}</div>`;
  let content = '';
  if (activeTab==='overview') {
    content = `
      <div class="panel mb3"><div class="panel-title">Offense</div><div class="stat-grid">
        ${STAT_FIELDS.filter(f=>f.cat==='offense').map(f=>statCard(f.label,t[f.key])).join('')}
        ${statCard('Shooting %',shootPct==='—'?'—':shootPct+'%')}
      </div></div>
      <div class="panel"><div class="panel-title">Defense</div><div class="stat-grid">
        ${STAT_FIELDS.filter(f=>f.cat==='defense').map(f=>statCard(f.label,t[f.key])).join('')}
        ${statCard('Save %',savePct==='—'?'—':savePct+'%')}
      </div></div>`;
  } else if (activeTab==='stats') {
    content = `<div class="panel"><div class="panel-title">All Stats</div><div class="stat-grid">
      ${STAT_FIELDS.map(f=>statCard(f.label,t[f.key])).join('')}
      ${statCard('Shoot%',shootPct==='—'?'—':shootPct+'%')}${statCard('Save%',savePct==='—'?'—':savePct+'%')}
      ${statCard('API',api)}${statCard('OPI',opi)}${statCard('DPI',dpi)}
    </div></div>`;
  } else if (activeTab==='swim') {
    content = `<div class="panel"><div class="panel-title">Swim Times</div>
      ${SWIM_EVENTS.map(ev=>{
        const entries=season.swimTimes[ev]||[], best=bestTime(entries);
        return `<div style="background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px">
          <div class="row-between mb2"><span style="font-weight:700">${ev}</span><span class="swim-best">${best?best.toFixed(2)+'s':'—'}</span></div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${[...entries].sort((a,b)=>a.time-b.time).map(e=>`<span class="chip ${e.time===best?'chip-green':'chip-gray'}" style="cursor:pointer" onclick="deleteSwimTime('${season.id}','${ev}','${e.id}')">${e.time.toFixed(2)}s ✕</span>`).join('')||'<span class="text-xs text-sub">No times yet</span>'}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  } else if (activeTab==='games') {
    content = season.games.length===0
      ? `<div class="empty"><div class="empty-icon">🏊</div><p>No games yet. Hit + Game!</p></div>`
      : [...season.games].reverse().map(g=>{
          const gk=calcKPIs([g]);
          return `<div class="g-entry">
            <div class="g-header"><div><span style="font-weight:700;font-size:15px">vs ${g.opponent}</span><br><span class="text-xs text-sub">${g.date}</span></div><button class="btn btn-red btn-xs" onclick="deleteGame('${season.id}','${g.id}')">Remove</button></div>
            <div class="stat-grid">${STAT_FIELDS.slice(0,10).map(f=>statCard(f.label,g.stats[f.key]||0)).join('')}${statCard('Shoot%',gk.shootPct==='—'?'—':gk.shootPct+'%')}</div>
          </div>`;
        }).join('');
  }
  return `
    <div class="s-header mb3">
      <div class="s-header-top">
        <div><div class="row mb2">${typeBadge(season.type)} <span style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900">${season.label}</span></div>
        <div class="text-xs text-sub">${season.startDate&&season.endDate?season.startDate+' → '+season.endDate:season.notes||'No dates set'}</div></div>
        <div class="s-actions">
          <button class="btn btn-brand btn-sm" onclick="modalLogGame('${season.id}')">+ Game</button>
          <button class="btn btn-green btn-sm" onclick="modalLogSwim('${season.id}')">+ Swim</button>
          <button class="btn btn-red btn-sm" onclick="deleteSeason('${season.id}')">Delete</button>
        </div>
      </div>
    </div>
    <div class="kpi-grid mb3">
      ${kpiCard('Games',gp,'var(--brand)')}${kpiCard('Goals',t.goals,'var(--mint)')}
      ${kpiCard('Shoot%',shootPct==='—'?'—':shootPct+'%','var(--mint)')}${kpiCard('Assists',t.assists,'var(--foam)')}
      ${kpiCard('Steals',t.steals,'var(--gold)')}${kpiCard('Blocks',t.blocks,'var(--foam)')}
      ${kpiCard('API',api,'var(--gold)')}${kpiCard('OPI',opi,'var(--brand)')}${kpiCard('DPI',dpi,'var(--mint)')}
    </div>
    ${tabBar}${content}`;
}
function setSeasonTab(tab) { window._seasonTab=tab; render(); }

// ── CAREER VIEW ───────────────────────────────────────────────────────────────
function renderCareerView(p) {
  if (p.seasons.length===0) return `<div class="empty"><div class="empty-icon">📅</div><p>No seasons yet. Add one above!</p></div>`;
  const active = p.seasons.filter(s=>state.careerSelected.has(s.id));
  const allGames = active.flatMap(s=>s.games);
  const {t,gp,shootPct,savePct,api,opi,dpi} = calcKPIs(allGames);
  const swimBests = Object.fromEntries(SWIM_EVENTS.map(ev=>[ev,bestTime(active.flatMap(s=>s.swimTimes[ev]||[]))]));
  return `
    <div class="career-banner mb3">
      <div class="row-between mb3">
        <div><div class="bc-title">Career Stats</div><div class="text-xs text-sub">${active.length}/${p.seasons.length} seasons · ${allGames.length} games</div></div>
        <button class="btn btn-ghost btn-sm" onclick="toggleAllSeasons()">${state.careerSelected.size===p.seasons.length?'Deselect All':'Select All'}</button>
      </div>
      <div class="s-pills">${p.seasons.map(s=>`<button class="s-pill ${state.careerSelected.has(s.id)?'on':''}" onclick="toggleCareerSeason('${s.id}')">${typeDot(s.type)}${s.label} (${s.games.length}G)</button>`).join('')}</div>
    </div>
    ${active.length===0?`<div class="empty"><p>Select at least one season.</p></div>`:`
    <div class="kpi-grid mb3">
      ${kpiCard('Games',gp,'var(--brand)')}${kpiCard('Goals',t.goals,'var(--mint)')}
      ${kpiCard('Assists',t.assists,'var(--foam)')}${kpiCard('Shoot%',shootPct==='—'?'—':shootPct+'%','var(--mint)')}
      ${kpiCard('Steals',t.steals,'var(--gold)')}${kpiCard('Blocks',t.blocks,'var(--foam)')}
      ${kpiCard('API',api,'var(--gold)')}${kpiCard('OPI',opi,'var(--brand)')}
      ${kpiCard('DPI',dpi,'var(--mint)')}${kpiCard('Save%',savePct==='—'?'—':savePct+'%','var(--rose)')}
    </div>
    <div class="panel mb3">
      <div class="panel-title">Season Breakdown</div>
      ${active.map(s=>{const k=calcKPIs(s.games);return `<div style="background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px">
        <div class="row-between mb2"><div><span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px">${s.label}</span> ${typeBadge(s.type)}</div><span class="chip chip-gray">${k.gp} games</span></div>
        <div class="stat-grid">${statCard('Goals',k.t.goals)}${statCard('Assists',k.t.assists)}${statCard('Shoot%',k.shootPct==='—'?'—':k.shootPct+'%')}${statCard('Steals',k.t.steals)}${statCard('Blocks',k.t.blocks)}${statCard('API',k.api)}</div>
      </div>`;}).join('')}
      <div style="background:rgba(2,132,199,.08);border:1px solid var(--brand);border-radius:10px;padding:12px">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:1px;color:var(--foam);font-size:13px;margin-bottom:8px">CAREER TOTAL</div>
        <div class="stat-grid">${statCard('Games',gp)}${statCard('Goals',t.goals)}${statCard('Assists',t.assists)}${statCard('Shoot%',shootPct==='—'?'—':shootPct+'%')}${statCard('Steals',t.steals)}${statCard('API',api)}</div>
      </div>
    </div>
    <div class="panel mb3">
      <div class="panel-title">Career Swim Bests</div>
      ${SWIM_EVENTS.map(ev=>{const cb=swimBests[ev];return `<div style="background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px">
        <div class="row-between mb2"><span style="font-weight:700">${ev}</span><span class="swim-best">${cb?cb.toFixed(2)+'s':'—'}</span></div>
        <div class="stat-grid">${active.map(s=>{const b=bestTime(s.swimTimes[ev]||[]);return statCard(s.label,b?`<span style="${b===cb?'color:var(--mint)':''}">${b.toFixed(2)}s</span>`:'—');}).join('')}</div>
      </div>`;}).join('')}
    </div>
    <div class="panel"><div class="panel-title">Career Stat Totals</div><div class="stat-grid">${STAT_FIELDS.map(f=>statCard(f.label,t[f.key])).join('')}</div></div>`}`;
}
function toggleCareerSeason(id) { if (state.careerSelected.has(id)) state.careerSelected.delete(id); else state.careerSelected.add(id); render(); }
function toggleAllSeasons() { const p=state.players.find(x=>x.id===state.selectedPlayerId); if (!p) return; state.careerSelected=state.careerSelected.size===p.seasons.length?new Set():new Set(p.seasons.map(s=>s.id)); render(); }

function tgAdj(id, delta) {
  const el = document.getElementById(id);
  if (!el) return;
  const cur = parseInt(el.dataset.val)||0;
  const next = Math.max(0, cur+delta);
  el.dataset.val = next;
  el.textContent = next;
}
async function saveTeamGame() {
  const opp = document.getElementById('tg-opp').value.trim();
  if (!opp) { alert('Please enter opponent name'); return; }
  const date = document.getElementById('tg-date').value;
  const usScore = parseInt(document.getElementById('tg-us').value)||0;
  const themScore = parseInt(document.getElementById('tg-them').value)||0;
  const opponent = `${opp} (${usScore}-${themScore})`;
  const quickStats = ['goals','assists','steals','blocks','personalFouls','turnovers'];
  const saves = state.players
    .filter(p => p.seasons.length > 0)
    .map(async p => {
      const sid = document.getElementById(`tg-${p.id}-sid`)?.value;
      if (!sid) return;
      const stats = {goals:0,attempts:0,missedShots:0,penaltyGoals:0,powerPlayGoals:0,counterAttackGoals:0,assists:0,blocks:0,steals:0,goalsAllowed:0,earnedExclusions:0,exclusionsForced:0,sprints:0,personalFouls:0,turnovers:0};
      quickStats.forEach(k => { stats[k] = parseInt(document.getElementById(`tg-${p.id}-${k}`)?.dataset.val)||0; });
      const g = await dbAddGame(sid, date, opponent, stats);
      if (g) { p.seasons.find(s=>s.id===sid).games.push(g); }
    });
  await Promise.all(saves);
  closeModal();
  render();
}

async function saveSwim(sid) {
  const t=parseFloat(document.getElementById('sw-time').value);
  if (isNaN(t)||t<=0) return;
  const ev=document.getElementById('sw-event').value;
  const entry=await dbAddSwimTime(sid,ev,t,document.getElementById('sw-date').value);
  if (entry) { const p=state.players.find(x=>x.id===state.selectedPlayerId); p.seasons.find(x=>x.id===sid).swimTimes[ev].push(entry); closeModal(); render(); }
}
async function deleteSwimTime(sid,ev,tid) {
  if (!confirm('Delete this time?')) return;
  await dbDeleteSwimTime(tid);
  const p=state.players.find(x=>x.id===state.selectedPlayerId);
  p.seasons.find(x=>x.id===sid).swimTimes[ev]=p.seasons.find(x=>x.id===sid).swimTimes[ev].filter(t=>t.id!==tid); render();
}

// When a coach logs in, check if they have pending invites by email
async function checkPendingInvites(user) {
  const {data} = await sb.from('club_members').select('*').eq('invited_email', user.email).eq('status','pending');
  if (data && data.length > 0) {
    for (const invite of data) {
      await sb.from('club_members').update({user_id: user.id, status:'active'}).eq('id', invite.id);
    }
  }
}

let saState = {
  allClubs: [], allMembers: [], allPlayers: [],
  impersonating: null,  // { userId, email, club }
  saView: 'home',       // 'home' | 'club' | 'user' | 'impersonating'
  selectedClubId: null,
  selectedUserId: null,
};

async function checkSuperAdmin(user) {
  const {data} = await sb.from('super_admins').select('id').eq('user_id', user.id);
  return data && data.length > 0;
}

async function enterSuperAdmin() {
  ['auth-screen','club-screen','app'].forEach(id => document.getElementById(id).classList.add('hidden'));
  document.getElementById('superadmin-screen').classList.remove('hidden');
  document.getElementById('impersonate-banner').classList.add('hidden');
  saState.saView = 'home';
  saState.impersonating = null;
  await loadSuperAdminData();
  renderSuperAdmin();
}

function exitSuperAdmin() {
  document.getElementById('superadmin-screen').classList.add('hidden');
  showClubScreen();
}

async function loadSuperAdminData() {
  const [clubsRes, membersRes, playersRes] = await Promise.all([
    sb.from('clubs').select('*').order('created_at'),
    sb.from('club_members').select('*').order('created_at'),
    sb.from('players').select('*').order('name'),
  ]);
  saState.allClubs = clubsRes.data || [];
  saState.allMembers = membersRes.data || [];
  saState.allPlayers = playersRes.data || [];
}

async function renderSuperAdmin() {
  const main = document.getElementById('sa-main');
  main.innerHTML = '<div class="loading"><div class="spinner" style="border-top-color:#7c3aed"></div><span style="color:#a78bfa">Loading...</span></div>';

  const [totalPlayers, totalGames, totalSeasons, totalSwim] = await Promise.all([
    sb.from('players').select('id', {count:'exact',head:true}),
    sb.from('games').select('id', {count:'exact',head:true}),
    sb.from('seasons').select('id', {count:'exact',head:true}),
    sb.from('swim_times').select('id', {count:'exact',head:true}),
  ]);

  // Get unique user list from clubs + members
  const userMap = {};
  saState.allClubs.forEach(c => {
    if (!userMap[c.created_by]) userMap[c.created_by] = { userId: c.created_by, email: '(admin)', clubs: [], role: 'admin' };
    userMap[c.created_by].clubs.push(c.name);
  });
  saState.allMembers.forEach(m => {
    const key = m.user_id || m.invited_email;
    if (!userMap[key]) userMap[key] = { userId: m.user_id, email: m.invited_email||'pending', clubs: [], role: m.role, status: m.status };
    if (m.club_id) {
      const club = saState.allClubs.find(c=>c.id===m.club_id);
      if (club) userMap[key].clubs.push(club.name);
    }
  });
  saState.userMap = userMap;

  main.innerHTML = `

    <div class="sa-grid" style="margin-bottom:14px">
      <div class="sa-stat"><div class="sa-stat-val">${saState.allClubs.length}</div><div class="sa-stat-label">Clubs</div></div>
      <div class="sa-stat"><div class="sa-stat-val">${Object.keys(userMap).length}</div><div class="sa-stat-label">Users</div></div>
      <div class="sa-stat"><div class="sa-stat-val">${totalPlayers.count||0}</div><div class="sa-stat-label">Players</div></div>
      <div class="sa-stat"><div class="sa-stat-val">${totalGames.count||0}</div><div class="sa-stat-label">Games</div></div>

      ${saState.allClubs.length === 0
        ? '<div style="text-align:center;padding:20px;color:#6b7280">No clubs yet</div>'

            const memberCount = saState.allMembers.filter(m=>m.club_id===c.id).length;
            const playerCount = saState.allPlayers.filter(p=>p.club_id===c.id).length;
            return `<div class="sa-club-row" onclick="saViewClub('${c.id}')">
              <div style="width:40px;height:40px;border-radius:8px;background:${c.primary_color||'#7c3aed'};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:#fff;overflow:hidden">
                ${c.logo_url?`<img src="${c.logo_url}" style="width:100%;height:100%;object-fit:cover">`:c.name.charAt(0)}

              <div style="flex:1;min-width:0">
                <div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div>
                <div style="font-size:11px;color:#6b7280">${memberCount+1} members · ${playerCount} players</div>
              </div>
              <span style="color:#a78bfa;font-size:18px;flex-shrink:0">›</span>
            </div>`;
          }).join('')}

          </div>`).join('')}
      </div>`;
    })()}

      <div class="sa-panel-title">All Users (${Object.keys(userMap).length})</div>
      ${Object.values(userMap).map(u => {
        const playerCount = saState.allPlayers.filter(p=>p.user_id===u.userId).length;

async function saViewUserById(userId) {
  // Find clubs this user owns or is member of
  const userClubs = saState.allClubs.filter(c=>c.created_by===userId);
  const memberClubs = saState.allMembers.filter(m=>m.user_id===userId).map(m=>saState.allClubs.find(c=>c.id===m.club_id)).filter(Boolean);
  const allUserClubs = [...userClubs, ...memberClubs.filter(c=>!userClubs.find(x=>x.id===c.id))];
  if (allUserClubs.length > 0) {
    await saImpersonateUser(userId, '');
  }
}

async function saImpersonateClub(clubId) {
  const club = saState.allClubs.find(c=>c.id===clubId);
  if (!club) return;
  saState.impersonating = { type: 'club', club, label: `Admin of ${club.name}` };
  await _doImpersonate({...club, _role:'admin'});
}

async function saImpersonateUser(userId, email) {
  // Find which clubs this user is in
  const ownedClubs = saState.allClubs.filter(c=>c.created_by===userId).map(c=>({...c,_role:'admin'}));
  const memberClubs = saState.allMembers.filter(m=>m.user_id===userId).map(m=>{
    const club = saState.allClubs.find(c=>c.id===m.club_id);
    return club ? {...club, _role: m.role} : null;
  }).filter(Boolean);
  const allClubs = [...ownedClubs, ...memberClubs.filter(c=>!ownedClubs.find(x=>x.id===c.id))];

  if (allClubs.length === 0) {
    // No clubs - show their unassigned players
    saState.impersonating = { type: 'user', userId, label: email||userId };
    const tempUser = {...state.user, id: userId};
    // Load players for this user without club filter
    const {data: players} = await sb.from('players').select('*').eq('user_id', userId).order('number');
    if (!players || players.length === 0) {
      alert('This user has no clubs or players yet.');
      return;
    }
    // Use first player's data to enter
    alert(`This user has ${players.length} players but no clubs. They need to create or join a club first.`);
    return;
  }

  saState.impersonating = { type: 'user', userId, label: email||userId };
  if (allClubs.length === 1) {
    await _doImpersonate(allClubs[0]);
  } else {
    // Multiple clubs - show picker
    const main = document.getElementById('sa-main');
    main.innerHTML = `
      <button class="btn-purple" style="margin-bottom:14px" onclick="renderSuperAdmin()">← Back</button>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:#a78bfa;margin-bottom:16px">Choose club to enter as this user</div>
      ${allClubs.map(c=>`
        <div class="sa-club-row" onclick="_doImpersonate(${JSON.stringify(c).replace(/"/g,'&quot;')})">
          <div style="width:40px;height:40px;border-radius:8px;background:${c.primary_color||'#7c3aed'};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:#fff">${c.name.charAt(0)}</div>
          <div style="flex:1;min-width:0"><div style="font-weight:700">${c.name}</div><div style="font-size:11px;color:#6b7280">${c._role}</div></div>
          <span style="color:#a78bfa;font-size:18px">›</span>
        </div>`).join('')}`;
  }
}

async function _doImpersonate(club) {
  // Override state to act as this user in this club
  state.currentClub = club;
  state.myRole = club._role || 'admin';
  applyBranding(club);

  // Show impersonate banner
  const banner = document.getElementById('impersonate-banner');
  const label = saState.impersonating ? saState.impersonating.label : club.name;
  document.getElementById('impersonate-label-name').textContent = `${label} → ${club.name}`;
  banner.classList.remove('hidden');

  // Move banner into app topbar area
  const topbar = document.getElementById('topbar');
  topbar.parentNode.insertBefore(banner, topbar.nextSibling);

  document.getElementById('superadmin-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('nav-admin').style.display = club._role==='admin'?'':'none';

  // If impersonating a specific user, filter players to their user_id
  if (saState.impersonating?.type === 'user' && saState.impersonating?.userId) {
    // Temporarily override user id for data loading
    const origId = state.user.id;
    state.user = {...state.user, id: saState.impersonating.userId};
    await loadAllData();
    state.user = {...state.user, id: origId};
  } else {
    await loadAllData();
  }
  render();
}

function stopImpersonating() {
  saState.impersonating = null;
  document.getElementById('impersonate-banner').classList.add('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('superadmin-screen').classList.remove('hidden');
  const root = document.documentElement;
  root.style.setProperty('--brand','#0284c7');
  root.style.setProperty('--brand2','#10b981');
  root.style.setProperty('--brandbg','#07111e');
  renderSuperAdmin();
}

async function enterPlayerDashboard(playerData) {
  const club = playerData.clubs;
  playerState.club = club;
  playerState.activeTab = 'dashboard';

  // Apply club branding
  if (club) applyBranding(club);

  // Load full player data
  const {data: seasons} = await sb.from('seasons').select('*').eq('player_id', playerData.id).order('created_at');
  const {data: games} = await sb.from('games').select('*').order('date');
  const {data: swimData} = await sb.from('swim_times').select('*').order('date');

  const builtSeasons = (seasons||[]).map(s => ({
    id:s.id, label:s.label, type:s.type||'standard',
    startDate:s.start_date||'', endDate:s.end_date||'', notes:s.notes||'',
    games: (games||[]).filter(g=>g.season_id===s.id).map(g=>({id:g.id,date:g.date||'',opponent:g.opponent,stats:g.stats||emptyStats()})),
    swimTimes: Object.fromEntries(SWIM_EVENTS.map(ev=>[ev,(swimData||[]).filter(t=>t.season_id===s.id&&t.event===ev).map(t=>({id:t.id,time:t.time,date:t.date||''}))]))
  }));

  playerState.player = {
    id:playerData.id, name:playerData.name, number:playerData.number||'',
    position:playerData.position||'', teamName:playerData.team_name||'',
    seasons: builtSeasons
  };

  // Load teammates if club allows comparisons
  if (club && club.show_comparisons) {
    const {data: teammates} = await sb.from('players').select('*').eq('club_id', club.id).neq('id', playerData.id);
    if (teammates) {
      const tmSeasons = await sb.from('seasons').select('*').in('player_id', teammates.map(t=>t.id));
      const tmGames = await sb.from('games').select('*');
      playerState.teammates = teammates.map(tm => ({
        id:tm.id, name:tm.name, number:tm.number||'', position:tm.position||'',
        seasons: (tmSeasons.data||[]).filter(s=>s.player_id===tm.id).map(s=>({
          ...s,
          games: (tmGames.data||[]).filter(g=>g.season_id===s.id).map(g=>({...g,stats:g.stats||emptyStats()})),
          swimTimes: Object.fromEntries(SWIM_EVENTS.map(ev=>[ev,[]]))
        }))
      }));
    }
  }

  // Show player screen
  ['auth-screen','club-screen','app','superadmin-screen'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('player-screen').classList.remove('hidden');

  // Set header
  document.getElementById('player-name-display').textContent = playerState.player.name;
  if (club) {
    document.getElementById('player-club-name').textContent = club.name;
    if (club.logo_url) { const img = document.getElementById('player-club-logo'); img.src=club.logo_url; img.style.display=''; }
  }

  renderPlayerDashboard();
}
